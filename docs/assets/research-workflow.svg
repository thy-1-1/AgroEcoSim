<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">AgroEcoSim research workflow</title>
  <desc id="desc">A six-step workflow from indicator processing to scenario recommendations.</desc>
  <rect width="1200" height="360" fill="#f7f9f5"/>
  <g font-family="Arial, sans-serif">
    <text x="60" y="58" fill="#18231f" font-size="26" font-weight="700">Research Workflow</text>
    <text x="60" y="86" fill="#5f6e67" font-size="14">Six connected work packages convert ecological assumptions into scenario evidence.</text>
  </g>
  <line x1="110" y1="184" x2="1090" y2="184" stroke="#cbd8d1" stroke-width="4"/>
  <g font-family="Arial, sans-serif">
    <g transform="translate(60 132)">
      <circle cx="50" cy="52" r="35" fill="#1d3d32"/>
      <text x="50" y="58" fill="#ffffff" text-anchor="middle" font-size="15" font-weight="700">WP1</text>
      <text x="50" y="121" fill="#18231f" text-anchor="middle" font-size="15" font-weight="700">Data</text>
      <text x="50" y="143" fill="#5f6e67" text-anchor="middle" font-size="12">indicator pipeline</text>
    </g>
    <g transform="translate(250 132)">
      <circle cx="50" cy="52" r="35" fill="#277da1"/>
      <text x="50" y="58" fill="#ffffff" text-anchor="middle" font-size="15" font-weight="700">WP2</text>
      <text x="50" y="121" fill="#18231f" text-anchor="middle" font-size="15" font-weight="700">Model</text>
      <text x="50" y="143" fill="#5f6e67" text-anchor="middle" font-size="12">crop + food web</text>
    </g>
    <g transform="translate(440 132)">
      <circle cx="50" cy="52" r="35" fill="#6f5c85"/>
      <text x="50" y="58" fill="#ffffff" text-anchor="middle" font-size="15" font-weight="700">WP3</text>
      <text x="50" y="121" fill="#18231f" text-anchor="middle" font-size="15" font-weight="700">Simulate</text>
      <text x="50" y="143" fill="#5f6e67" text-anchor="middle" font-size="12">dynamic trajectories</text>
    </g>
    <g transform="translate(630 132)">
      <circle cx="50" cy="52" r="35" fill="#e5b84d"/>
      <text x="50" y="58" fill="#2b2514" text-anchor="middle" font-size="15" font-weight="700">WP4</text>
      <text x="50" y="121" fill="#18231f" text-anchor="middle" font-size="15" font-weight="700">Evaluate</text>
      <text x="50" y="143" fill="#5f6e67" text-anchor="middle" font-size="12">PSR + stability</text>
    </g>
    <g transform="translate(820 132)">
      <circle cx="50" cy="52" r="35" fill="#d97955"/>
      <text x="50" y="58" fill="#ffffff" text-anchor="middle" font-size="15" font-weight="700">WP5</text>
      <text x="50" y="121" fill="#18231f" text-anchor="middle" font-size="15" font-weight="700">Uncertainty</text>
      <text x="50" y="143" fill="#5f6e67" text-anchor="middle" font-size="12">inference + update</text>
    </g>
    <g transform="translate(1010 132)">
      <circle cx="50" cy="52" r="35" fill="#18231f"/>
      <text x="50" y="58" fill="#e5b84d" text-anchor="middle" font-size="15" font-weight="700">WP6</text>
      <text x="50" y="121" fill="#18231f" text-anchor="middle" font-size="15" font-weight="700">Decide</text>
      <text x="50" y="143" fill="#5f6e67" text-anchor="middle" font-size="12">scenario matrix</text>
    </g>
  </g>
</svg>
