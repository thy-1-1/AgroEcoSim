<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Scenario comparison</title>
  <desc id="desc">A stylized scenario comparison chart showing stability improvement and chemical pressure reduction.</desc>
  <rect width="1200" height="520" fill="#f7f9f5"/>
  <rect x="48" y="48" width="1104" height="424" fill="#ffffff" stroke="#d9e2dc"/>
  <g font-family="Arial, sans-serif">
    <text x="86" y="96" fill="#18231f" font-size="28" font-weight="700">Scenario Experiment Matrix</text>
    <text x="86" y="124" fill="#5f6e67" font-size="14">Stability rises as chemical pressure is replaced by biological control and soil response.</text>
  </g>
  <g stroke="#d9e2dc" stroke-width="1">
    <line x1="120" y1="398" x2="1065" y2="398"/>
    <line x1="120" y1="330" x2="1065" y2="330"/>
    <line x1="120" y1="262" x2="1065" y2="262"/>
    <line x1="120" y1="194" x2="1065" y2="194"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="12" fill="#5f6e67">
    <text x="74" y="402">0.40</text>
    <text x="74" y="334">0.50</text>
    <text x="74" y="266">0.60</text>
    <text x="74" y="198">0.70</text>
    <text x="74" y="152">0.80</text>
  </g>
  <polyline points="158,310 326,284 494,254 662,238 830,210 998,185" fill="none" stroke="#1d3d32" stroke-width="5"/>
  <polyline points="158,180 326,246 494,274 662,286 830,324 998,358" fill="none" stroke="#d97955" stroke-width="5"/>
  <g fill="#1d3d32">
    <circle cx="158" cy="310" r="8"/><circle cx="326" cy="284" r="8"/><circle cx="494" cy="254" r="8"/>
    <circle cx="662" cy="238" r="8"/><circle cx="830" cy="210" r="8"/><circle cx="998" cy="185" r="8"/>
  </g>
  <g fill="#d97955">
    <circle cx="158" cy="180" r="8"/><circle cx="326" cy="246" r="8"/><circle cx="494" cy="274" r="8"/>
    <circle cx="662" cy="286" r="8"/><circle cx="830" cy="324" r="8"/><circle cx="998" cy="358" r="8"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="12" fill="#18231f" text-anchor="middle">
    <text x="158" y="433">Baseline</text>
    <text x="326" y="433">Withdrawal</text>
    <text x="494" y="433">Bats</text>
    <text x="662" y="433">Bees</text>
    <text x="830" y="433">Integrated</text>
    <text x="998" y="433">Organic</text>
  </g>
  <g font-family="Arial, sans-serif">
    <rect x="826" y="84" width="278" height="62" rx="8" fill="#edf3ef" stroke="#cbd8d1"/>
    <circle cx="852" cy="111" r="7" fill="#1d3d32"/>
    <text x="870" y="116" fill="#18231f" font-size="13" font-weight="700">Composite stability score</text>
    <circle cx="852" cy="134" r="7" fill="#d97955"/>
    <text x="870" y="139" fill="#18231f" font-size="13" font-weight="700">Chemical pressure index</text>
  </g>
  <g font-family="Arial, sans-serif">
    <rect x="872" y="166" width="150" height="44" rx="8" fill="#1d3d32"/>
    <text x="947" y="194" fill="#ffffff" text-anchor="middle" font-size="15" font-weight="700">0.5299 to 0.7141</text>
  </g>
